name: Generar y desplegar webs

on:
  repository_dispatch:
    types: [nueva_propiedad, sheet-updated]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # cron de seguridad cada hora

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Reconstruir credentials.json desde Secret
        env:
          GOOGLE_CREDENTIALS_JSON_B64: ${{ secrets.GOOGLE_CREDENTIALS_JSON_B64 }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS_JSON_B64" ]; then
            echo "$GOOGLE_CREDENTIALS_JSON_B64" | base64 -d > credentials.json
          else
            printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials.json
          fi
          python -c "import json; json.load(open('credentials.json'))"

      - name: Ejecutar generador
        env:
          SPREADSHEET_ID:       ${{ secrets.SPREADSHEET_ID }}
          SHEET_ID:             ${{ secrets.SHEET_ID }}
          WORKSHEET_NAME:       ${{ secrets.WORKSHEET_NAME }}
          GOOGLE_MAPS_API_KEY:  ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER:           ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:           ${{ secrets.EMAIL_PASS }}
          SITE_BASE_URL:        ${{ secrets.SITE_BASE_URL }}
          GITHUB_PAGES_BASE:    ${{ secrets.SITE_BASE_URL }}
          PEDRO_WHATSAPP:       ${{ secrets.PEDRO_WHATSAPP }}
        run: python main.py

      - name: Limpiar credentials.json
        if: always()
        run: rm -f credentials.json

      - name: Commit de los sites generados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sites/
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-generación de sitios"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
